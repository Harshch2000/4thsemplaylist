
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Playlist Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

header {
    background: #000;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.main {
    display: flex;
    height: calc(100vh - 60px);
}

.player {
    flex: 3;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

.player iframe {
    width: 90%;
    height: 80%;
    border-radius: 12px;
    border: none;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.playlist {
    flex: 1;
    background: rgba(0,0,0,0.8);
    overflow-y: auto;
    padding: 10px;
}

.video-item {
    padding: 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.video-item:hover {
    background: #ff0000;
}

.search-box {
    padding: 10px;
    text-align: center;
    background: #111;
}

input {
    padding: 8px;
    width: 90%;
    border-radius: 20px;
    border: none;
    outline: none;
}

footer {
    text-align: center;
    padding: 10px;
    background: #000;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
🎬 My Video Playlist
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search playlist...">
</div>

<div class="main">

<div class="player">
<iframe id="videoPlayer" src="https://www.youtube.com/embed/uB3i-qV6VdM" allowfullscreen></iframe>
</div>

<div class="playlist" id="playlist">

<div class="video-item" onclick="playVideo('uB3i-qV6VdM')">▶ Video 1</div>
<div class="video-item" onclick="playVideo('gm5DcqzZ3f4')">▶ Video 2</div>
<div class="video-item" onclick="playVideo('s-s9ilkMVj8')">▶ Video 3</div>
<div class="video-item" onclick="playVideo('E5jVBqe59EE')">▶ Video 4</div>
<div class="video-item" onclick="playVideo('gZpUcsB9TFc')">▶ Video 5</div>
<div class="video-item" onclick="playVideo('YatDNnaJ1TU')">▶ Video 6</div>
<div class="video-item" onclick="playVideo('qul0f79gxGs')">▶ Video 7</div>
<div class="video-item" onclick="playVideo('f8luGFRtshY')">▶ Video 8</div>

</div>

</div>

<footer>
© 2026 Playlist Streaming Site
</footer>

<script>
function playVideo(videoId) {
    document.getElementById("videoPlayer").src =
        "https://www.youtube.com/embed/" + videoId;
}

const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("keyup", function() {
    let filter = searchInput.value.toLowerCase();
    let items = document.querySelectorAll(".video-item");

    items.forEach(item => {
        if (item.textContent.toLowerCase().includes(filter)) {
            item.style.display = "";
        } else {
            item.style.display = "none";
        }
    });
});
</script>

</body>
</html>
