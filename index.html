<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Video Streaming Library</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
    header{padding:24px;text-align:center;background:linear-gradient(135deg,#1d4ed8,#7c3aed);box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .container{display:grid;grid-template-columns:2fr 1fr;gap:24px;padding:24px}
    .player{background:#111827;border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
    iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:14px}
    .video-title{font-size:1.2rem;margin:14px 0}
    .sidebar{background:#111827;border-radius:18px;padding:16px;max-height:80vh;overflow:auto}
    .search{width:100%;padding:12px;border:none;border-radius:10px;margin-bottom:12px}
    .item{padding:12px;border-radius:12px;cursor:pointer;margin-bottom:8px;background:#1f2937;transition:.2s}
    .item:hover,.item.active{background:#2563eb}
    .item small{display:block;color:#cbd5e1;margin-top:4px}
    @media(max-width:900px){.container{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <h1>Artificial Intelligence Video Library</h1>
  <p>Stream videos directly here without leaving the website</p>
</header>
<div class="container">
  <section class="player">
    <iframe id="player" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    <div class="video-title" id="currentTitle"></div>
  </section>
  <aside class="sidebar">
    <input type="file" id="csvUpload" accept=".csv" class="search" style="margin-bottom:10px;background:#fff;color:#000;">
    <input id="search" class="search" placeholder="Search videos...">
    <div id="playlist"></div>
  </aside>
</div>
<script>
const csvFile = 'videos.csv';
const csvUpload = document.getElementById('csvUpload');
let videos = [];const player = document.getElementById('player'); const currentTitle = document.getElementById('currentTitle'); const playlist = document.getElementById('playlist'); const search = document.getElementById('search');

function playVideo(video){ player.src = https://www.youtube.com/embed/${video.id}?rel=0; currentTitle.textContent = video.title; document.querySelectorAll('.item').forEach(el=>el.classList.toggle('active', el.dataset.id===video.id)); }

function render(list){ playlist.innerHTML=''; list.forEach(video=>{ const div=document.createElement('div'); div.className='item'; div.dataset.id=video.id; div.innerHTML=${video.title}<small>${video.id}</small>; div.onclick=()=>playVideo(video); playlist.appendChild(div); }); }

search.addEventListener('input',()=>{ const q=search.value.toLowerCase(); render(videos.filter(v=>v.title.toLowerCase().includes(q))); });

function extractVideoId(url){ const match = url.match(/(?:v=|youtu.be/)([A-Za-z0-9_-]{11})/); return match ? match[1] : null; }

function parseCSV(text){ const rows = text.trim().split(/ ? /); const headers = rows[0].match(/("[^"]*"|[^,]+)/g).map(h => h.replace(/^"|"$/g,'').trim()); const titleIndex = headers.indexOf('title'); const videoIdIndex = headers.indexOf('videoId'); const linkIndex = headers.indexOf('videoUrl');

videos = rows.slice(1).map(row => { const cols = row.match(/("[^"]*"|[^,]+)/g)?.map(c => c.replace(/^"|"$/g,'').trim()) || []; const title = cols[titleIndex] || 'Untitled'; const id = cols[videoIdIndex] || extractVideoId(cols[linkIndex] || ''); return id ? {title,id} : null; }).filter(Boolean);

render(videos); if(videos.length) playVideo(videos[0]); }

async function loadCSV(){ try{ const res = await fetch(csvFile); const text = await res.text(); parseCSV(text); }catch(e){ currentTitle.textContent = 'Please choose your videos.csv file using the upload box.'; } }

csvUpload.addEventListener('change', (e)=>{ const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = ev => parseCSV(ev.target.result); reader.readAsText(file); });

loadCSV(); </script>

</body>
</html>
