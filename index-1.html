<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Streaming Playlist</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#111;color:#fff}
.container{display:flex;flex-wrap:wrap;min-height:100vh}
.player{flex:2;min-width:320px;padding:20px}
.player iframe{width:100%;height:60vh;border:none;border-radius:12px;background:#000}
.current-title{font-size:22px;margin:12px 0}
.sidebar{flex:1;min-width:280px;background:#1c1c1c;padding:15px;overflow-y:auto;max-height:100vh}
.video-item{display:flex;gap:12px;padding:10px;border-radius:10px;cursor:pointer;margin-bottom:10px;background:#2a2a2a}
.video-item:hover{background:#333}
.thumb img{width:120px;border-radius:8px}
.meta{font-size:14px;line-height:1.4}
small{color:#bbb}
</style>
</head>
<body>
<div class="container">
  <div class="player">
    <iframe id="videoPlayer" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
    </iframe>
    <div class="current-title" id="currentTitle">Loading videos...</div>
  </div>
  <div class="sidebar">
    <h2>Video List</h2>
    <div id="videoList"></div>
  </div>
</div>

<script>
async function loadVideos() {
  try {
    const response = await fetch('videoos.csv');
    const csvText = await response.text();
    const rows = csvText.trim().split(/\r?\n/).slice(1);
    const videos = rows.map(row => {
      const cols = row.match(/(".*?"|[^",]+)(?=,|$)/g).map(c => c.replace(/^"|"$/g,''));
      return {
        title: cols[1],
        videoId: cols[3],
        publishedAt: cols[4]
      };
    }).filter(v => v.videoId);

    const list = document.getElementById('videoList');
    const player = document.getElementById('videoPlayer');
    const title = document.getElementById('currentTitle');

    function playVideo(video){
      player.src = `https://www.youtube.com/embed/${video.videoId}?autoplay=1`;
      title.textContent = video.title;
    }

    videos.forEach((video, index) => {
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = `
        <div class="thumb">
          <img src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg" alt="">
        </div>
        <div class="meta">
          <div>${video.title}</div>
          <small>${new Date(video.publishedAt).toLocaleDateString()}</small>
        </div>`;
      item.onclick = () => playVideo(video);
      list.appendChild(item);
      if(index === 0) playVideo(video);
    });
  } catch (error) {
    document.getElementById('currentTitle').textContent = 'Could not load video list.';
  }
}
loadVideos();
</script>
</body>
</html>
